<!DOCTYPE html>
<html>
<head>
    <title>Stock Dashboard Pro</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2c2c54);
            color: white;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            position: relative;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            width: 250px;
        }

        button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #00c9a7;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #00a387;
        }

        #suggestions {
            position: absolute;
            top: 45px;
            background: white;
            color: black;
            width: 250px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
        }

        #suggestions div {
            padding: 8px;
            cursor: pointer;
        }

        #suggestions div:hover {
            background: #eee;
        }

        canvas {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>📊 Stock Dashboard Pro</h2>

    <div class="controls">
        <input type="text" id="companyInput" placeholder="Search stock (TCS, INFY, AAPL)" onkeyup="showSuggestions()">
        <button onclick="loadData()">Search</button>

        <div id="suggestions"></div>
    </div>

    <canvas id="chart" height="100"></canvas>

</div>

<script>
let chart;

// 🔥 Company list
const companies = [
    "TCS", "INFY", "RELIANCE", "HDFC", "ICICIBANK",
    "SBIN", "WIPRO", "LT", "AAPL", "MSFT", "GOOGL"
];

// 🔍 Show suggestions
function showSuggestions() {
    let input = document.getElementById("companyInput").value.toUpperCase();
    let box = document.getElementById("suggestions");

    box.innerHTML = "";

    if (!input) {
        box.style.display = "none";
        return;
    }

    let filtered = companies.filter(c => c.includes(input));

    filtered.forEach(item => {
        let div = document.createElement("div");
        div.innerText = item;

        div.onclick = () => {
            document.getElementById("companyInput").value = item;
            box.style.display = "none";
        };

        box.appendChild(div);
    });

    box.style.display = filtered.length ? "block" : "none";
}

// 🧠 Format symbol
function formatSymbol(input) {
    input = input.trim().toUpperCase();

    if (!input.includes(".")) {
        return input + ".NS"; // Indian stocks
    }
    return input;
}

// 📊 Load chart
function loadData() {
    let input = document.getElementById("companyInput").value;

    if (!input) {
        alert("Please enter a stock name");
        return;
    }

    let symbol = formatSymbol(input);

    fetch("http://127.0.0.1:8000/data/" + symbol)
    .then(res => res.json())
    .then(data => {

        if (data.error) {
            alert("Stock not found!");
            return;
        }

        const labels = data.map(d => d.Date.split(" ")[0]);
        const prices = data.map(d => d.Close);

        if (chart) chart.destroy();

        chart = new Chart(document.getElementById("chart"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: symbol,
                    data: prices,
                    borderColor: "#00c9a7",
                    backgroundColor: "rgba(0,201,167,0.2)",
                    tension: 0.4,
                    fill: true
                }]
            }
        });
    })
    .catch(err => {
        console.error(err);
        alert("Error fetching data");
    });
}
</script>

</body>
</html>
